name: Build macOS app

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:      # lets you run it manually from the Actions tab

concurrency:              # cancel superseded runs on the same ref
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-15     # swap for a self-hosted label if you need Xcode 26 (Liquid Glass)
    steps:
      - uses: actions/checkout@v4

      - name: Toolchain
        run: |
          sudo xcode-select -s /Applications/Xcode.app 2>/dev/null || true
          swift --version

      - name: Build Whitespace.app
        run: ./make_app.sh

      - name: Zip the app
        run: ditto -c -k --keepParent Whitespace.app Whitespace.app.zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Whitespace-app
          path: Whitespace.app.zip
          if-no-files-found: error

      # On a version tag (e.g. `git tag v0.1 && git push --tags`), publish a release.
      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: Whitespace.app.zip
